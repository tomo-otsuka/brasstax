<svg width="170" height="60" viewBox="0 0 170 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brassRefined" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dfbd69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#926d27;stop-opacity:1" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&display=swap');
      .brass { font-family: 'Outfit', sans-serif; font-weight: 300; font-size: 26px; fill: #ffffff; letter-spacing: 0.05em; }
      .tax { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 26px; fill: #ffffff; letter-spacing: 0.08em; }
      .mark-line { stroke: url(#brassRefined); stroke-width: 1.5; stroke-linecap: round; }
      .mark-head { fill: url(#brassRefined); }
    </style>
  </defs>

  <!-- Ultra-Minimalist Mark -->
  <g transform="translate(18, 30)">
    <line x1="0" y1="-12" x2="0" y2="12" class="mark-line" />
    <circle cx="0" cy="-12" r="4" class="mark-head" />
  </g>

  <!-- Refined Typography -->
  <text x="40" y="39">
    <tspan class="brass">Brass</tspan>
    <tspan class="tax" dx="8">Tax</tspan>
  </text>
</svg>