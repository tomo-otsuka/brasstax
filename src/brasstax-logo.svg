<svg width="220" height="60" viewBox="0 0 220 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&display=swap');
      .logo-text { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 28px; fill: #ffffff; }
      .icon-mark { fill: url(#logoGradient); }
    </style>
  </defs>

  <!-- Abstract Tack Icon -->
  <g transform="translate(16, 15)">
    <!-- Tack Head -->
    <circle cx="14" cy="14" r="12" class="icon-mark" />
    <!-- Tack Pin (Abstract Triangle) -->
    <path d="M 14 26 L 10 38 Q 14 42 18 38 L 14 26" class="icon-mark" opacity="0.8" />
  </g>

  <!-- Logo Text -->
  <text x="56" y="39" class="logo-text">Brass Tax</text>
</svg>